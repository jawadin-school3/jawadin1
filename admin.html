<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الأستاذ - متوسطة الجوادين</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { padding: 12px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 8px; background: #2563eb; color: white; }
        .student-list { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container" id="adminApp">
    <h2>لوحة تحكم الأستاذ</h2>
    
    <div id="selectionArea">
        <h3>اختر الصف:</h3>
        <button class="btn" onclick="loadClasses('1st')">الأول المتوسط</button>
        <button class="btn" onclick="loadClasses('2nd')">الثاني المتوسط</button>
        <button class="btn" onclick="loadClasses('3rd')">الثالث المتوسط</button>
    </div>

    <div id="displayArea" class="student-list"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jawadin-school1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // دالة لجلب الطلاب حسب الصف
    function loadClasses(grade) {
        const display = document.getElementById('displayArea');
        display.innerHTML = "جاري جلب البيانات...";
        
        db.ref('students').orderByChild('grade').equalTo(grade).on('value', (snapshot) => {
            const students = snapshot.val();
            if (!students) { display.innerHTML = "لا يوجد طلاب مسجلين في هذا الصف."; return; }
            
            let html = "<h3>قائمة الطلاب:</h3><ul>";
            for (let id in students) {
                html += `<li style="cursor:pointer; color:blue;" onclick="showStudentDetails('${id}')">${students[id].fullName} - ${students[id].classSection}</li>`;
            }
            html += "</ul>";
            display.innerHTML = html;
        });
    }

    // دالة عرض بيانات الطالب (التي ستتوسع لاحقاً لإضافة الدرجات)
    function showStudentDetails(studentId) {
        db.ref('students/' + studentId).once('value', (snapshot) => {
            const data = snapshot.val();
            const display = document.getElementById('displayArea');
            display.innerHTML = `
                <h3>بيانات الطالب: ${data.fullName}</h3>
                <p>الهاتف: ${data.phone}</p>
                <img src="${data.photoUrl}" style="width:100px; border-radius:50%;">
                <hr>
                <h4>إضافة درجات:</h4>
                <input type="text" id="gradeInput" placeholder="أدخل الدرجة">
                <button class="btn" onclick="saveGrade('${studentId}')">حفظ الدرجة</button>
                <hr>
                <h4>إرسال تبليغ خاص:</h4>
                <textarea id="privateNote" placeholder="اكتب تبليغاً خاصاً للطالب..."></textarea>
                <button class="btn" onclick="sendPrivateNote('${studentId}')">إرسال</button>
            `;
        });
    }

    function saveGrade(id) { /* دالة حفظ الدرجة في Firebase */ }
    function sendPrivateNote(id) {
        const note = document.getElementById('privateNote').value;
        db.ref('students/' + id + '/privateNote').set(note);
        alert("تم إرسال التبليغ الخاص للطالب!");
    }
</script>
</body>
</html>
