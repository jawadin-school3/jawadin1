<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأستاذ - متوسطة الجوادين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --color-text-dark: #0f172a;
            --color-blue: #2563eb;
            --color-blue-hover: #1d4ed8;
            --font-main: 'Tajawal', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-secondary);
            color: var(--color-text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .admin-card {
            background-color: var(--bg-primary);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #1e3a8a;
            font-size: 22px;
            font-weight: 800;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
            font-size: 14px;
        }

        input[type="password"], textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        .btn {
            background-color: var(--color-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            font-family: var(--font-main);
        }

        .btn:hover {
            background-color: var(--color-blue-hover);
        }

        .hidden {
            display: none;
        }

        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
        }

        .success-msg {
            color: #22c55e;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <img src="2.jpg" onerror="this.onerror=null; this.src='https://assets.onecompiler.app/42t37w25r/42t37vq8z/2.jpg';" alt="شعار مدرسة الجوادين" style="max-width: 100px; border-radius: 50%; margin-bottom: 15px;" />
        
        <!-- قسم تسجيل الدخول بالأرقام السرية -->
        <div id="loginSection">
            <h2>بوابة الإدارة والأستاذ المعني</h2>
            <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">يرجى إدخال الرقم السري للأستاذ للتمكن من نشر التبليغات للطلاب</p>
            <div class="input-group">
                <label for="password">رمز الدخول السري:</label>
                <input type="password" id="password" placeholder="أدخل رمز المرور السري هنا">
            </div>
            <button class="btn" onclick="checkPassword()">دخول</button>
            <p id="errorArea" class="error-msg hidden">رمز الدخول غير صحيح!</p>
        </div>

        <!-- قسم إضافة التبليغات (يظهر فقط عند إدخال كلمة المرور الصحيحة) -->
        <div id="publishSection" class="hidden">
            <h2>لوحة نشر التبليغات والتعميمات</h2>
            <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">اكتب التبليغ بالأسفل وسيظهر فوراً على شاشات الطلاب في الموقع الرسمي</p>
            
            <div class="input-group">
                <label for="announcementText">نص التبليغ:</label>
                <textarea id="announcementText" placeholder="اكتب التبليغ هنا (مثلاً: نود إعلام طلاب الصف الثالث بنشر درجات الشهر الثاني...)"></textarea>
            </div>

            <div class="input-group">
                <label for="announcementDate">تاريخ النشر (اختياري):</label>
                <input type="text" id="announcementDate" placeholder="مثال: 2026/07/14 أو اتركها فارغة للتاريخ الحالي">
            </div>

            <button class="btn" onclick="publishNow()">نشر التبليغ للطلاب الآن 🚀</button>
            <p id="successArea" class="success-msg hidden">تم نشر التبليغ بنجاح وسيظهر للطلبة فوراً!</p>
        </div>
    </div>

    <!-- استدعاء مكاتب فايربيس الرسمية للربط بقاعدة البيانات -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // إعدادات اتصال الفايربيس بمشروعك (نفس الإعدادات في ملف index.html)
        const firebaseConfig = {
            authDomain: "jawadin-school.firebaseapp.com",
            projectId: "jawadin-school",
            storageBucket: "jawadin-school.appspot.com",
        };

        // تهيئة فايربيس
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 🚨 حدد كلمة المرور السرية للأستاذ هنا (يمكنك تغييرها لأي شيء تريده)
        const ADMIN_PASSWORD = "jawadin_teacher_2026"; 

        function checkPassword() {
            const enteredPass = document.getElementById('password').value;
            const errorArea = document.getElementById('errorArea');

            if (enteredPass === ADMIN_PASSWORD) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('publishSection').classList.remove('hidden');
            } else {
                errorArea.classList.remove('hidden');
            }
        }

        function publishNow() {
            const text = document.getElementById('announcementText').value;
            let date = document.getElementById('announcementDate').value;
            const successArea = document.getElementById('successArea');

            if (!text.trim()) {
                alert("الرجاء كتابة نص التبليغ أولاً!");
                return;
            }

            // إذا لم يحدد الأستاذ تاريخاً، نستخدم تاريخ اليوم تلقائياً
            if (!date.trim()) {
                const today = new Date();
                date = today.getFullYear() + '/' + (today.getMonth() + 1) + '/' + today.getDate();
            }

            // إرسال البيانات لـ Firestore في مجموعة "announcements"
            db.collection("announcements").add({
                text: text,
                date: date,
                timestamp: firebase.firestore.FieldValue.serverTimestamp() // للترتيب التلقائي من الأحدث للأقدم
            })
            .then(() => {
                successArea.classList.remove('hidden');
                document.getElementById('announcementText').value = ""; // تفريغ الخانة بعد النشر
                document.getElementById('announcementDate').value = "";
                
                // إخفاء رسالة النجاح بعد 4 ثوانٍ
                setTimeout(() => {
                    successArea.classList.add('hidden');
                }, 4000);
            })
            .catch((error) => {
                console.error("حدث خطأ أثناء النشر: ", error);
                alert("فشل النشر، يرجى التحقق من اتصال الإنترنت أو إعدادات قاعدة البيانات.");
            });
        }
    </script>
</body>
</html>
