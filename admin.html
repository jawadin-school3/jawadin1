<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الإدارة - متوسطة الجوادين</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .student-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; border-right: 5px solid #2563eb; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>لوحة تحكم الإدارة</h1>
    <div id="studentsList">جاري تحميل بيانات الطلاب...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        firebase.initializeApp({databaseURL: "https://jawadin-school1-default-rtdb.firebaseio.com"});
        const db = firebase.database();

        db.ref('students').on('value', (s) => {
            const list = document.getElementById('studentsList');
            list.innerHTML = '';
            const students = s.val();
            for (let name in students) {
                const st = students[name];
                let div = document.createElement('div');
                div.className = 'student-card';
                div.innerHTML = `
                    <h3>${name} - الصف: ${st.grade}</h3>
                    <textarea id="note_${name}" placeholder="أدخل التبليغ الخاص للطالب">${st.private_notifications || ''}</textarea>
                    <button onclick="saveData('${name}')">حفظ التبليغ</button>
                    <hr>
                    <p>يمكنك أيضاً تعديل الدرجات من خلال قاعدة البيانات مباشرة في Firebase.</p>
                `;
                list.appendChild(div);
            }
        });

        function saveData(name) {
            const note = document.getElementById('note_' + name).value;
            db.ref('students/' + name + '/private_notifications').set(note, () => {
                alert('تم حفظ التبليغ للطالب ' + name);
            });
        }
    </script>
</body>
</html>
