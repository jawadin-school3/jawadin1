<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الأستاذ - متوسطة الجوادين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f3f4f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #2563eb; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="loginView">
    <h2>دخول الأستاذ</h2>
    <input type="password" id="adminPass" placeholder="أدخل الرمز السري للأستاذ">
    <button onclick="checkAdmin()">دخول</button>
</div>

<div class="container" id="adminView" style="display:none;">
    <h2>إدارة قاعدة بيانات الطلاب</h2>
    <select id="selectGrade" onchange="loadStudents()">
        <option value="">اختر الصف...</option>
        <option value="1">الأول متوسط</option>
        <option value="2">الثاني متوسط</option>
        <option value="3">الثالث متوسط</option>
    </select>
    <select id="selectClass" onchange="loadStudents()">
        <option value="">اختر الشعبة...</option>
    </select>
    <div id="studentsList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://jawadin-school1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkAdmin() {
        if(document.getElementById('adminPass').value === "123456") { // يمكنك تغيير الرمز
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('adminView').style.display = 'block';
        } else { alert("رمز خاطئ!"); }
    }

    function loadStudents() {
        const grade = document.getElementById('selectGrade').value;
        const cls = document.getElementById('selectClass').value;
        if(!grade) return;
        
        db.ref('students').orderByChild('grade').equalTo(grade).on('value', snap => {
            const list = document.getElementById('studentsList');
            list.innerHTML = "";
            snap.forEach(s => {
                const stu = s.val();
                if(stu.classOption === cls || !cls) {
                    list.innerHTML += `<div style="border-bottom:1px solid #ccc; padding:10px;">
                        <strong>${stu.fullName}</strong>
                        <button onclick="editStudent('${s.key}')">تعديل درجات/تبليغ</button>
                    </div>`;
                }
            });
        });
    }
    // ملاحظة: أكمل بناء دالة editStudent لفتح نافذة إدخال الدرجات والتبليغ الاختياري.
</script>
</body>
</html>
