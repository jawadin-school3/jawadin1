<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأستاذ - متوسطة الجوادين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --color-text-dark: #0f172a;
            --color-blue: #2563eb;
            --color-blue-hover: #1d4ed8;
            --font-main: 'Tajawal', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-secondary);
            color: var(--color-text-dark);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .admin-card {
            background-color: var(--bg-primary);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            padding: 35px;
            border: 1px solid #e2e8f0;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-logo img {
            max-width: 100px;
            height: auto;
            border-radius: 50%;
            border: 3px solid var(--color-blue);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            color: var(--color-text-dark);
            margin-bottom: 10px;
        }

        .sub-title {
            font-size: 14px;
            color: #64748b;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 14px;
            color: #334155;
        }

        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 15px;
            color: var(--color-text-dark);
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            border-color: var(--color-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* تنسيق مخصص لزر اختيار ملف الصورة */
        .file-upload-wrapper {
            position: relative;
            margin-top: 5px;
        }

        .file-upload-btn {
            display: block;
            text-align: center;
            background-color: #f1f5f9;
            border: 2px dashed #cbd5e1;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            color: #475569;
            transition: all 0.3s ease;
        }

        .file-upload-btn:hover {
            background-color: #e2e8f0;
            border-color: var(--color-blue);
        }

        input[type="file"] {
            display: none;
        }

        .image-preview {
            margin-top: 15px;
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            display: none;
            border: 1px solid #e2e8f0;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--color-blue);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-family: var(--font-main);
            font-weight: 800;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--color-blue-hover);
        }

        /* رسائل الحالة التنبيهية */
        .status-msg {
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 700;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status-success {
            background-color: #dcfce7;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }

        .status-error {
            background-color: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <div class="header-logo">
            <img src="2.jpg" onerror="this.onerror=null; this.src='https://assets.onecompiler.app/42t37w25r/42t37vq8z/2.jpg';" alt="شعار مدرسة الجوادين">
        </div>
        
        <h2>لوحة تحكم الأستاذ والإدارة</h2>
        <div class="sub-title">يمكنك كتابة التبليغ للطلاب ورفع صورة من هاتفك مباشرة لتظهر في الصفحة الرئيسية.</div>

        <form id="notificationForm" onsubmit="publishNotification(event)">
            
            <div class="form-group">
                <label for="notifText">نص التبليغ أو الإعلان *</label>
                <textarea id="notifText" placeholder="اكتب هنا التبليغ أو التعليمات الإدارية للطلاب أولياء الأمور..." required></textarea>
            </div>

            <div class="form-group">
                <label>إرفاق صورة مع التبليغ (اختياري)</label>
                <div class="file-upload-wrapper">
                    <label for="notifImage" class="file-upload-btn" id="uploadLabel">اضغط هنا لاختيار صورة من هاتفك</label>
                    <input type="file" id="notifImage" accept="image/*" onchange="previewImage(event)">
                </div>
                <img id="imgPreview" class="image-preview" alt="معاينة الصورة">
            </div>

            <div class="form-group">
                <label for="secretKey">الرمز السري الأمني للنشر *</label>
                <input type="password" id="secretKey" placeholder="أدخل رمز المرور الخاص بالنشر..." required>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">نشر التبليغ للطلاب الآن</button>
        </form>

        <div id="statusBox" class="status-msg"></div>
    </div>

    <!-- استدعاء المكاتب الرسمية لـ Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // إعداد وتأسيس الاتصال بالـ Firebase الخاص بك
        const firebaseConfig = {
            databaseURL: "https://jawadin-school1-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let base64Image = ""; // متغير لتخزين ترميز الصورة بعد تحويلها

        // دالة لمعاينة الصورة المرفوعة من الهاتف وتحويلها لـ Base64
        function previewImage(event) {
            const file = event.target.files[0];
            const preview = document.getElementById('imgPreview');
            const label = document.getElementById('uploadLabel');

            if (file) {
                // التأكد من أن الملف المختار هو صورة بالفعل
                if (!file.type.startsWith('image/')) {
                    showStatus("يرجى اختيار ملف صورة صالح فقط!", false);
                    event.target.value = "";
                    return;
                }

                // قراءة وتحويل الصورة
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64Image = e.target.result; // خزن الصورة المرمزة بـ base64
                    preview.src = base64Image;
                    preview.style.display = "block";
                    label.innerText = `تم اختيار: ${file.name}`;
                    label.style.borderColor = "#2563eb";
                };
                reader.readAsDataURL(file);
            } else {
                base64Image = "";
                preview.style.display = "none";
                label.innerText = "اضغط هنا لاختيار صورة من هاتفك";
                label.style.borderColor = "#cbd5e1";
            }
        }

        // دالة إرسال ونشر البيانات إلى Firebase
        function publishNotification(event) {
            event.preventDefault();

            const text = document.getElementById('notifText').value.trim();
            const password = document.getElementById('secretKey').value;
            const submitBtn = document.getElementById('submitBtn');

            // 1. التحقق من الرمز السري
            if (password !== "jawadin_secret_2026") {
                showStatus("الرمز السري الأمني غير صحيح! يرجى التأكد وإعادة المحاولة.", false);
                return;
            }

            // تعطيل الزر لتجنب التكرار أثناء الرفع
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري النشر والرفع...";

            // 2. صياغة تاريخ اليوم تلقائياً بصيغة جميلة (مثل: 2026-07-14)
            const today = new Date();
            const yyyy = today.getFullYear();
            let mm = today.getMonth() + 1; // الأشهر تبدأ من 0
            let dd = today.getDate();

            if (dd < 10) dd = '0' + dd;
            if (mm < 10) mm = '0' + mm;
            const formattedDate = yyyy + '-' + mm + '-' + dd;

            // 3. بناء كائن البيانات الجديد للتبليغ
            const newPost = {
                text: text,
                date: formattedDate,
                image: base64Image // ستكون فارغة إذا لم يختر المدرس صورة
            };

            // 4. الرفع إلى مسار notifications في قاعدة البيانات
            database.ref('notifications').push(newPost)
                .then(() => {
                    showStatus("تم نشر التبليغ ورفعه بنجاح! سيظهر الآن للطلاب فوراً في الواجهة.", true);
                    
                    // إعادة تهيئة النموذج بالكامل بعد النجاح
                    document.getElementById('notificationForm').reset();
                    document.getElementById('imgPreview').style.display = "none";
                    document.getElementById('uploadLabel').innerText = "اضغط هنا لاختيار صورة من هاتفك";
                    base64Image = ""; 
                })
                .catch((error) => {
                    console.error("Firebase Error: ", error);
                    showStatus("حدث خطأ أثناء الاتصال بقاعدة البيانات. حاول مجدداً.", false);
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "نشر التبليغ للطلاب الآن";
                });
        }

        // دالة مساعدة لإظهار رسائل الحالة بنجاح أو فشل
        function showStatus(message, isSuccess) {
            const statusBox = document.getElementById('statusBox');
            statusBox.innerText = message;
            statusBox.className = isSuccess ? "status-msg status-success" : "status-msg status-error";
            statusBox.style.display = "block";

            // إخفاء الرسالة تلقائياً بعد 6 ثوانٍ
            setTimeout(() => {
                statusBox.style.display = "none";
            }, 6000);
        }
    </script>
</body>
</html>
