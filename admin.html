<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأستاذ - متوسطة الجوادين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f3f4f6;
            color: #0f172a;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .control-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 22px;
            font-weight: 800;
            color: #2563eb;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .btn-submit {
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: #1d4ed8;
        }
        .notice {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
        }
        .notification-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            position: relative;
        }
        .btn-delete {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
        }
    </style>
</head>
<body>

    <div class="control-card">
        <h1>لوحة نشر التبليغات الرسمية 📣</h1>
        
        <div class="form-group">
            <label for="adminPassword">رمز الدخول السري للأستاذ:</label>
            <input type="password" id="adminPassword" placeholder="أدخل الرمز السري لتتمكن من النشر">
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #e5e7eb;">

        <form id="announcementForm">
            <div class="form-group">
                <label for="announcementText">نص التبليغ:</label>
                <textarea id="announcementText" rows="5" placeholder="اكتب تفاصيل الإعلان هنا..." required></textarea>
            </div>

            <div class="form-group">
                <label for="announcementImage">رابط الصورة (اختياري):</label>
                <input type="url" id="announcementImage" placeholder="مثال: https://i.ibb.co/image.png">
                <p class="notice">يرجى رفع الصورة على أي موقع رفع خارجي (مثل imgbb) ولصق الرابط المباشر هنا.</p>
            </div>

            <button type="submit" class="btn-submit">نشر التبليغ فوراً للطلاب 🚀</button>
        </form>

        <h2 style="font-size: 18px; margin-top: 40px; border-top: 1px solid #e5e7eb; padding-top: 20px;">التبليغات الحالية (يمكنك حذفها من هنا):</h2>
        <div id="currentAnnouncements"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // تم ربط الرابط الخاص بقاعدتك هنا بنجاح
        const firebaseConfig = {
            databaseURL: "https://jawadin-school1-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // كلمة المرور التي يختارها الأستاذ (تستطيع تغييرها لأي شيء تريده)
        const CORRECT_PASSWORD = "jawadin_secret_2026"; 

        const form = document.getElementById('announcementForm');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const passwordInput = document.getElementById('adminPassword').value;
            const textInput = document.getElementById('announcementText').value;
            const imageInput = document.getElementById('announcementImage').value;

            // التحقق من كلمة المرور لحماية الموقع
            if (passwordInput !== CORRECT_PASSWORD) {
                alert('عذراً! رمز الدخول السري غير صحيح. لا يمكن النشر.');
                return;
            }

            // الحصول على تاريخ اليوم وتنسيقه
            const today = new Date();
            const formattedDate = today.toLocaleDateString('ar-IQ', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            // دفع التبليغ الجديد إلى قاعدة البيانات
            database.ref('announcements').push({
                text: textInput,
                image: imageInput,
                date: formattedDate
            }).then(() => {
                alert('تم نشر التبليغ بنجاح وسيظهر للطلبة الآن!');
                form.reset();
            }).catch((err) => {
                alert('حدث خطأ أثناء النشر: ' + err.message);
            });
        });

        // عرض التبليغات الحالية في صفحة التحكم مع إمكانية حذفها
